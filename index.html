<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Abhishek Pallepati</title>

  <link rel="icon" href="https://mastermilkyshake.github.io/static/favicon.svg" type="image/svg+xml">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0f172a;
      --page: #ffffff;
      --ink: #0f1419;
      --muted: #5c6370;
      --hair: rgba(15, 20, 25, .10);

      --accent: #5a5adc;

      --radius: 22px;
      --shadow: 0 28px 70px rgba(0, 0, 0, .30);

      --pad: clamp(16px, 4vw, 56px);
      --pad-mobile: clamp(14px, 4vw, 22px);

      --sans: "DM Sans", system-ui, -apple-system, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--sans);
      background:
        radial-gradient(circle at 20% 30%, rgba(79, 70, 229, .25), transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(0, 212, 255, .20), transparent 50%),
        linear-gradient(135deg, #0a0f1e, #111827, #1a1f35);
      padding: var(--pad);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .sheet {
      width: min(1100px, 100%);
      background: var(--page);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 20px var(--pad);
      border-bottom: 1px solid var(--hair);
    }

    .nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid var(--hair);
      background: white;
      font-size: 14px;
      text-decoration: none;
      color: var(--ink);
    }

    main {
      padding: 40px var(--pad);
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 40px;
      align-items: center;
    }

    /* 🔥 HERO SECTION */
    .hero {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .profile-pic {
      width: clamp(160px, 22vw, 260px);
      aspect-ratio: 1 / 1;
      border-radius: 24px;
      object-fit: cover;

      /* clean modern card look */
      border: 1px solid rgba(0,0,0,0.08);
      box-shadow:
        0 20px 50px rgba(0,0,0,0.15),
        0 0 0 6px rgba(90,90,220,0.06);
    }

    h1 {
      font-size: clamp(44px, 5vw, 80px);
      line-height: 1.05;
    }

    .lede {
      color: var(--muted);
      max-width: 40ch;
      line-height: 1.6;
    }

    .panels {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .panel {
      border: 1px solid var(--hair);
      border-radius: 18px;
      padding: 18px;
    }

    .panel h2 {
      font-size: 12px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .entry {
      padding: 12px 0;
      border-top: 1px solid var(--hair);
    }

    .entry:first-child {
      border-top: none;
    }

    /* 📱 MOBILE */
    @media (max-width: 720px) {
      main {
        grid-template-columns: 1fr;
        gap: 24px;
      }

      .hero {
        align-items: center;
        text-align: center;
      }

      .profile-pic {
        width: clamp(140px, 40vw, 200px);
        border-radius: 20px;
      }

      h1 {
        font-size: clamp(36px, 10vw, 52px);
      }
    }
  </style>
</head>

<body>
  <div class="sheet">
    <header>
      <nav class="nav">
        <a class="btn" href="#">YouTube</a>
        <a class="btn" href="#">LinkedIn</a>
        <a class="btn" href="#">GitHub</a>
      </nav>
      <nav class="nav">
        <a class="btn" href="#">Resume</a>
        <a class="btn" href="#">Contact</a>
      </nav>
    </header>

    <main>
      <section class="hero">
        <img src="https://mastermilkyshake.github.io/static/profile.jpeg" class="profile-pic">
        <h1>Abhishek Pallepati</h1>
        <p class="lede">
          Student with interests in biophysics and biotechnology, with an emphasis on research and emergency medicine.
        </p>
      </section>

      <section class="panels">
        <div class="panel">
          <h2>Experience</h2>
          <div class="entry">Emergency Medical Technician — NYC</div>
        </div>

        <div class="panel">
          <h2>Education</h2>
          <div class="entry">Haverford College — Biophysics</div>
        </div>
      </section>
    </main>
  </div>
</body>

</html>
