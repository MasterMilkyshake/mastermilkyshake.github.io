<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Abhishek Pallepati</title>

  <link rel="icon" href="https://mastermilkyshake.github.io/static/favicon.svg" type="image/svg+xml">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0f172a;
      --page: #ffffff;
      --ink: #0f1419;
      --muted: #5c6370;
      --hair: rgba(15, 20, 25, .10);

      --accent: #5a5adc;
      --accent-hover: #4a4acc;

      --radius: 22px;
      --shadow: 0 28px 70px rgba(0, 0, 0, .30);

      --pad: clamp(16px, 4vw, 56px);
      --pad-mobile: clamp(14px, 4vw, 22px);

      --sans: "DM Sans", system-ui, -apple-system, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
    }

    body {
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      background:
        radial-gradient(circle at 20% 30%, rgba(79, 70, 229, .25) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(0, 212, 255, .20) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(236, 72, 153, .15) 0%, transparent 60%),
        linear-gradient(135deg, #0a0f1e 0%, #111827 50%, #1a1f35 100%);
      padding:
        calc(var(--pad) + env(safe-area-inset-top)) calc(var(--pad) + env(safe-area-inset-right)) calc(var(--pad) + env(safe-area-inset-bottom)) calc(var(--pad) + env(safe-area-inset-left));
      min-height: 100svh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
    }

    .sheet {
      width: min(1100px, 100%);
      background: var(--page);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
      isolation: isolate;
    }

    .ribbon,
    .ribbon2,
    .grid,
    .orb,
    .center-glow {
      position: absolute;
      pointer-events: none;
      z-index: 0;
    }

    .ribbon {
      inset: -24% -30% auto auto;
      width: 76%;
      height: 92%;
      transform: rotate(11deg);
      background:
        radial-gradient(70% 70% at 28% 32%, rgba(79, 70, 229, .60), transparent 62%),
        radial-gradient(62% 62% at 68% 38%, rgba(0, 212, 255, .45), transparent 64%),
        radial-gradient(68% 68% at 48% 72%, rgba(236, 72, 153, .35), transparent 60%);
      mask-image: radial-gradient(62% 72% at 62% 48%, #000 52%, transparent 74%);
      -webkit-mask-image: radial-gradient(62% 72% at 62% 48%, #000 52%, transparent 74%);
      opacity: .65;
      filter: blur(1px);
    }

    .ribbon2 {
      inset: auto auto -24% -30%;
      width: 76%;
      height: 92%;
      transform: rotate(-11deg);
      background:
        radial-gradient(70% 70% at 72% 68%, rgba(79, 70, 229, .55), transparent 62%),
        radial-gradient(62% 62% at 32% 62%, rgba(0, 212, 255, .40), transparent 64%),
        radial-gradient(68% 68% at 52% 30%, rgba(236, 72, 153, .30), transparent 60%);
      mask-image: radial-gradient(62% 72% at 38% 52%, #000 52%, transparent 74%);
      -webkit-mask-image: radial-gradient(62% 72% at 38% 52%, #000 52%, transparent 74%);
      opacity: .28;
      filter: blur(1px);
    }

    .grid {
      inset: 0;
      background-image:
        linear-gradient(to right, rgba(230, 237, 245, .45) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(230, 237, 245, .45) 1px, transparent 1px);
      background-size: 100px 100px;
      opacity: .18;
      mask-image: radial-gradient(65% 65% at 40% 35%, #000 45%, transparent 75%);
      -webkit-mask-image: radial-gradient(65% 65% at 40% 35%, #000 45%, transparent 75%);
    }

    .orb {
      border-radius: 50%;
      filter: blur(80px);
      opacity: .10;
    }

    .orb1 {
      width: 520px;
      height: 520px;
      background: radial-gradient(circle, rgba(79, 70, 229, .6), transparent);
      top: -18%;
      right: -12%;
    }

    .orb2 {
      width: 360px;
      height: 360px;
      background: radial-gradient(circle, rgba(236, 72, 153, .45), transparent);
      top: 52%;
      right: 10%;
    }

    .center-glow {
      top: 18%;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      height: 62%;
      background:
        radial-gradient(ellipse at 50% 50%, rgba(79, 70, 229, .22) 0%, transparent 60%),
        radial-gradient(ellipse at 30% 60%, rgba(0, 212, 255, .18) 0%, transparent 55%),
        radial-gradient(ellipse at 70% 40%, rgba(236, 72, 153, .16) 0%, transparent 55%);
      filter: blur(60px);
      opacity: .55;
    }

    .content {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: min(760px, 100%);
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 20px var(--pad);
      border-bottom: 1px solid var(--hair);
      background: rgba(255, 255, 255, .92);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn {
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid var(--hair);
      background: rgba(255, 255, 255, .78);
      color: var(--ink);
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: transform .15s ease, background .15s ease, border-color .15s ease;
      min-height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }

    .btn:hover {
      border-color: rgba(79, 70, 229, .45);
      background: rgba(79, 70, 229, .06);
    }

    .btn.primary {
      background: linear-gradient(180deg, #5a5adc 0%, #4a4acc 100%);
      color: #fff;
    }

    main {
      padding: clamp(22px, 3vw, 44px) var(--pad);
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 40px;
      align-items: center;
    }

    /* ONLY CHANGE STARTS HERE */
    .profile-pic {
      width: clamp(140px, 20vw, 220px);
      aspect-ratio: 1 / 1;
      border-radius: 18px;
      object-fit: cover;
      display: block;
      margin-bottom: 14px;
      border: none;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.18);
    }

    section:first-child {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }
    /* ONLY CHANGE ENDS HERE */

    h1 {
      font-size: clamp(44px, 5.8vw, 84px);
      font-weight: 750;
      margin-bottom: 14px;
    }

    .lede {
      color: var(--muted);
      max-width: 42ch;
      line-height: 1.7;
    }

    .panels {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .panel {
      border: 1px solid var(--hair);
      border-radius: 18px;
      padding: 18px;
    }

    @media (max-width: 720px) {
      main {
        grid-template-columns: 1fr;
      }

      section:first-child {
        align-items: center;
        text-align: center;
      }
    }
  </style>
</head>

<body>
  <div class="sheet">
    <div class="content">
      <header>
        <nav class="nav">
          <a class="btn" href="#">YouTube</a>
          <a class="btn" href="#">LinkedIn</a>
          <a class="btn" href="#">GitHub</a>
        </nav>

        <nav class="nav">
          <a class="btn" href="#">Resume</a>
          <a class="btn primary" href="#">Contact</a>
        </nav>
      </header>

      <main>
        <section>
          <img src="https://mastermilkyshake.github.io/static/profile.jpeg" class="profile-pic">
          <h1>Abhishek Pallepati</h1>
          <p class="lede">
            Student with interests in biophysics and biotechnology, with an emphasis on research and emergency medicine.
          </p>
        </section>

        <section class="panels">
          <div class="panel">
            <h2>Experience</h2>
            <div>Emergency Medical Technician — NYC</div>
          </div>

          <div class="panel">
            <h2>Education</h2>
            <div>Haverford College — Biophysics</div>
          </div>
        </section>
      </main>
    </div>
  </div>
</body>

</html>
